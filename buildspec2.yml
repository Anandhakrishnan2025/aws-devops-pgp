version: 0.2

env:
  variables:
    REPOSITORY_URI: 127214157582.dkr.ecr.us-west-2.amazonaws.com/capstone-proj2
    AWS_DEFAULT_REGION: us-west-2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin 127214157582.dkr.ecr.us-west-2.amazonaws.com

  build:
    commands:
      - echo Build started on `date`
      - docker build -t capstone-app .
      - docker tag capstone-app:latest $REPOSITORY_URI:latest

  post_build:
    commands:
      - echo Pushing image to ECR...
      - docker push $REPOSITORY_URI:latest
      - echo Build completed on `date`
